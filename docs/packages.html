<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Packages</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="top-bar">

    <a href="index.html" class="back-btn">
        ← Back to Home
    </a>

</div>

    <div class="container">

        <h1>Manage Tour Packages</h1>

        <form id="packageForm">

            <input
                type="text"
                id="packageName"
                placeholder="Package Name"
                required>

            <input
                type="text"
                id="destination"
                placeholder="Destination"
                required>

            <input
                type="text"
                id="duration"
                placeholder="Duration"
                required>

            <input
                type="number"
                id="price"
                placeholder="Price"
                required>

            <textarea
                id="description"
                placeholder="Description"
                rows="4"
                required></textarea>

            <button type="submit">
                Add Package
            </button>

        </form>

        <hr>

        <h2>Available Packages</h2>

        <div id="packageList"></div>

    </div>

    <script src="js/package.js"></script>

</body>

</html>
